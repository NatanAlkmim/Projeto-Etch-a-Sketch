<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="main.js" defer></script>
  <link rel="stylesheet" href="style.css">
  <title>Projeto-Etch-a-Sketch</title>
</head>
<body>
  <fieldset id="buttons">
    <button id="grid-size">Tamanho da Grade</button>
    <button id="clear-all">Limpar quadrados</button>
  </fieldset>
  <fieldset id="check-options">
    <legend>Opções</legend>

    <input type="checkbox" id="mudar-cor">
    <label for="mudar-cor">Quadrados coloridos</label>
    
    <input type="checkbox" id="click-to-color">
    <label for="click-to-color">Clique para colorir</label>
  </fieldset>
  <div id="container", class="grids-opacity"></div>
</body>
</html>
